# Example Prometheus alert rules for llmproxy.
#
# Load this file in your Prometheus configuration:
#
#   rule_files:
#     - /etc/prometheus/llmproxy-alerts.yml
#
# Adjust thresholds to match your traffic patterns.
# All thresholds use a 5-minute evaluation window by default.

groups:
  - name: llmproxy
    rules:
      # -------------------------------------------------------------------
      # High request volume
      # -------------------------------------------------------------------

      - alert: LLMProxyHighRequestRate
        expr: |
          sum(rate(llmproxy_requests_total[5m])) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM proxy request rate is high"
          description: |
            The proxy is receiving {{ $value | humanize }} requests/s
            (5-minute average). Threshold: 100 req/s.

      - alert: LLMProxyVeryHighRequestRate
        expr: |
          sum(rate(llmproxy_requests_total[5m])) > 500
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "LLM proxy request rate is very high"
          description: |
            The proxy is receiving {{ $value | humanize }} requests/s
            (5-minute average). Threshold: 500 req/s.

      # -------------------------------------------------------------------
      # High error rate (overall)
      # -------------------------------------------------------------------

      - alert: LLMProxyHighErrorRate
        expr: |
          sum(rate(llmproxy_requests_total{status=~"5.."}[5m]))
            /
          sum(rate(llmproxy_requests_total[5m]))
            > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM proxy error rate is above 5%"
          description: |
            {{ $value | humanizePercentage }} of requests are returning
            5xx errors (5-minute window). Threshold: 5%.

      - alert: LLMProxyCriticalErrorRate
        expr: |
          sum(rate(llmproxy_requests_total{status=~"5.."}[5m]))
            /
          sum(rate(llmproxy_requests_total[5m]))
            > 0.20
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "LLM proxy error rate is above 20%"
          description: |
            {{ $value | humanizePercentage }} of requests are returning
            5xx errors (5-minute window). Threshold: 20%.

      # -------------------------------------------------------------------
      # Client error rate (4xx)
      # -------------------------------------------------------------------

      - alert: LLMProxyHighClientErrorRate
        expr: |
          sum(rate(llmproxy_requests_total{status=~"4.."}[5m]))
            /
          sum(rate(llmproxy_requests_total[5m]))
            > 0.10
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LLM proxy client error rate is above 10%"
          description: |
            {{ $value | humanizePercentage }} of requests are returning
            4xx errors (5-minute window). This may indicate misconfigured
            clients or expired API keys.

      # -------------------------------------------------------------------
      # Backend errors (per model)
      # -------------------------------------------------------------------

      - alert: LLMProxyBackendErrors
        expr: |
          sum by (model) (rate(llmproxy_backend_errors_total[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LLM proxy backend errors for model {{ $labels.model }}"
          description: |
            Backend "{{ $labels.model }}" is returning errors at
            {{ $value | humanize }}/s (5-minute average).
            Check the backend health and connectivity.

      # -------------------------------------------------------------------
      # Backend latency (per model)
      # -------------------------------------------------------------------

      - alert: LLMProxyHighBackendLatency
        expr: |
          histogram_quantile(0.95,
            sum by (model, le) (rate(llmproxy_backend_duration_seconds_bucket[5m]))
          ) > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LLM proxy backend latency is high for {{ $labels.model }}"
          description: |
            95th percentile backend response time for "{{ $labels.model }}"
            is {{ $value }}s (10-minute window). Threshold: 30s.

      # -------------------------------------------------------------------
      # No requests (proxy might be down)
      # -------------------------------------------------------------------

      - alert: LLMProxyNoTraffic
        expr: |
          sum(rate(llmproxy_requests_total[10m])) == 0
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "LLM proxy has received no traffic"
          description: |
            No requests have been received in the last 15 minutes.
            The proxy might be down or unreachable.
