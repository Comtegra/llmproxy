# Logging level (CRITICAL, ERROR, WARNING, INFO or DEBUG)
log_level = "INFO"

# Listening address
host = "0.0.0.0"
port = 8080

# Backend timeouts
timeout_connect = 5  # connection timeout
timeout_read = 60  # response timeout

# Allowed HTTP origins
# This value will be sent in the Access-Control-Allow-Origin response header.
http_origin = "*"

[db]

# Database URI
# Absolute (e.g. sqlite:///media/api/db.sqlite) or relative (e.g. sqlite://db.sqlite) URL.
# The only supported URL schemas are sqlite and mongodb.
# May be overriden via LLMPROXY_DB_URI environment variable.
uri = "sqlite://db.sqlite"

# Backend definitions
# One backend corresponds to one model (retrievable through /v1/models).
# See README for the full field reference.

#[backends.mychat]
## Required fields
#url = "https://mychat.mynamespace.cgc-waw-01.comtegra.cloud"
#token = "mytoken1"
#device = "a5000"                                    # GPU name, used for billing
#model = "meta-llama/Meta-Llama-3-8B-Instruct"       # full HuggingFace path
#type = "chat"                                       # "chat" | "embedding" | "audio"
#
## Optional fields
#quantization = "FP8"                                # free-form string
#context_length = 8192                               # auto-discovered from vLLM/SGLang if absent
#model_url = "https://example.com/custom-card"       # overrides auto-generated HuggingFace URL
#verify_ssl = true                                   # set to false to skip certificate verification

